version: '3.8'

services:

  frontend:
    container_name: angular-app
    build:
      context: ./spring-boot-microservices-angular/frontend
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    depends_on:
      - gateway
    networks:
      - microservices-network
    restart: unless-stopped

  eureka:
    container_name: eureka-service
    build:
      context: ./spring-boot-microservices-angular/backend/eureka-service
    environment:
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
    ports:
      - "8761:8761"
    networks:
      - microservices-network
    restart: unless-stopped
  
  gateway:
    container_name: api-gateway-service
    build:
      context: ./spring-boot-microservices-angular/backend/api-gateway-service
    ports:
      - "8888:8090"
    depends_on:
      - eureka
    networks:
      - microservices-network
    environment:
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
    restart: unless-stopped

  answer:
    container_name: answer-service
    build:
      context: ./spring-boot-microservices-angular/backend/answer-service
      dockerfile: dockerfile
    ports:
      - "8083:8083"
    depends_on:
      - eureka
      - gateway
      - mongodb
    networks:
      - microservices-network
    environment:
      - eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

networks:
  microservices-network:
    driver: bridge